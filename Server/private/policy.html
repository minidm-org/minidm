<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MiniDM - Policy</title>
    
    <script>
        const savedTheme = localStorage.getItem('theme') || 'light';
        document.documentElement.setAttribute('data-theme', savedTheme);
    </script>

    <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
    <div class="container">
        <h2 style="margin-top: 0; border-bottom: 2px solid #007bff; padding-bottom: 10px;">Policy Bundles</h2>
        <div style="display: flex; gap: 10px; margin-bottom: 15px; background: #f8f9fa; padding: 15px; border-radius: 6px; border: 1px solid #ddd;">
            <input type="text" id="newBundleName" placeholder="Bundle Name (e.g., Strict Security Baseline)" style="flex: 1; padding: 8px; border: 1px solid #ccc; border-radius: 4px;">
            <input type="text" id="newBundleDesc" placeholder="Description (Optional)" style="flex: 2; padding: 8px; border: 1px solid #ccc; border-radius: 4px;">
            <button onclick="createPolicyBundle()" style="background: #28a745; padding: 8px 15px;">Create Bundle</button>
        </div>
        <table>
            <thead><tr><th>Bundle Name</th><th>Description</th><th>Policies in Bundle</th><th>Actions</th></tr></thead>
            <tbody id="bundleTableBody"><tr><td colspan="4" style="text-align:center;">Loading bundles...</td></tr></tbody>
        </table>
    </div>

    <div class="container">
        <h2 style="margin-top: 0; border-bottom: 2px solid #007bff; padding-bottom: 10px;">Import ADMX / ADML Templates</h2>
        <div class="upload-box">
            <form id="admxUploadForm">
                <div><label><strong>1. Select ADMX File (Logic):</strong></label><br><input type="file" id="admxFile" accept=".admx" required></div>
                <div style="margin-top: 15px;"><label><strong>2. Select ADML File (Language):</strong></label><br><input type="file" id="admlFile" accept=".adml" required></div>
                <button type="submit" style="margin-top: 15px; background: #28a745; width: 100%;">Process and Import Policy</button>
            </form>
        </div>
    </div>

    <div class="container">
        <h2 style="margin-top: 0; border-bottom: 2px solid #007bff; padding-bottom: 10px;">Parsed Policies</h2>
        <table>
            <thead><tr><th>Display Name</th><th>Category</th><th>Registry Key</th><th>Actions</th></tr></thead>
            <tbody id="policyTableBody"><tr><td colspan="4" style="text-align:center;">Loading policies...</td></tr></tbody>
        </table>
    </div>

    <div id="unifiedConfigModal" class="modal-overlay">
        <div class="modal-box">
            <h3>Configure & Assign Policy</h3>
            <p style="color: #555; font-size: 0.9em;">Target Policy: <strong id="configPolicyName"></strong></p>
            
            <div id="dynamicFormContainer" style="background: #f8f9fa; padding: 15px; border: 1px solid #ddd; border-radius: 4px; margin-bottom: 15px;"></div>
            
            <h4 style="margin-bottom: 5px;">Assign to Bundles:</h4>
            <div id="bundleListContainer" class="scrollable-list"><p style="margin: 0; color: #666;">Loading bundles...</p></div>

            <div style="display: flex; justify-content: flex-end; gap: 10px; margin-top: 15px;">
                <button onclick="closeUnifiedModal()" style="background: #6c757d;">Cancel</button>
                <button onclick="saveConfiguration()" style="background: #28a745;">Save Configuration</button>
            </div>
        </div>
    </div>

    <script>
        let globalPolicies = []; 
        let currentPolicy = null;
        let allPolicyBundles = [];

        // --- BUNDLE MANAGEMENT LOGIC ---
        async function fetchBundles() {
            try {
                const response = await fetch('/api/admin/policy-bundles');
                allPolicyBundles = await response.json();
                const tbody = document.getElementById('bundleTableBody');
                tbody.innerHTML = '';

                if (allPolicyBundles.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="4" style="text-align:center; color:#666;">No policy bundles created.</td></tr>';
                    return;
                }

                allPolicyBundles.forEach(bundle => {
                    tbody.innerHTML += `
                        <tr id="bundle-row-${bundle.id}">
                            <td><strong>${bundle.name}</strong></td>
                            <td style="color:#555;">${bundle.description || '-'}</td>
                            <td><strong>${bundle.item_count || 0}</strong></td>
                            <td>
                                <button onclick="toggleBundleContents(${bundle.id})" style="background: #17a2b8;">Expand Items</button>
                                <button onclick="deletePolicyBundle(${bundle.id})" class="btn-danger" style="margin-left: 5px;">Delete</button>
                            </td>
                        </tr>
                    `;
                });
            } catch (error) { console.error('Error fetching bundles', error); }
        }

        async function createPolicyBundle() {
            const name = document.getElementById('newBundleName').value.trim();
            const description = document.getElementById('newBundleDesc').value.trim();
            if (!name) return alert("Bundle name is required.");
            try {
                const res = await fetch('/api/admin/policy-bundles', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, description })
                });
                if (res.ok) {
                    document.getElementById('newBundleName').value = '';
                    document.getElementById('newBundleDesc').value = '';
                    fetchBundles();
                } else { const err = await res.json(); alert("Error: " + err.error); }
            } catch (error) { alert("Network error."); }
        }

        async function deletePolicyBundle(bundleId) {
            if(!confirm("Are you sure you want to delete this Policy Bundle? It will be removed from all assigned groups.")) return;
            try {
                const res = await fetch(`/api/admin/policy-bundles/${bundleId}`, { method: 'DELETE' });
                if (res.ok) { await fetchBundles(); } 
                else { alert("Failed to delete bundle."); }
            } catch (err) { alert("Network error."); }
        }

        // --- EXPAND BUNDLES & REMOVE ITEMS ---
        async function toggleBundleContents(bundleId) {
            const rowId = `bundle-contents-${bundleId}`;
            const existingRow = document.getElementById(rowId);
            
            if (existingRow) {
                existingRow.style.display = existingRow.style.display === 'none' ? 'table-row' : 'none';
                return;
            }

            try {
                const res = await fetch(`/api/admin/policy-bundles/${bundleId}/items`);
                const items = await res.json();
                
                let itemsHtml = `<table class="nested-table"><thead><tr><th>Policy Name</th><th>Policy ID</th><th style="width: 80px;">Action</th></tr></thead><tbody>`;
                if(items.length === 0) {
                    itemsHtml += `<tr><td colspan="3" style="text-align:center; color:#666;">No policies assigned to this bundle yet.</td></tr>`;
                } else {
                    items.forEach(item => {
                        const safePol = encodeURIComponent(item.policy_id);
                        itemsHtml += `
                            <tr>
                                <td><strong>${item.display_name}</strong></td>
                                <td style="font-family: monospace; color:#555;">${item.policy_id}</td>
                                <td><button class="btn-danger" style="padding:4px 8px; font-size:0.8em;" onclick="removePolicyFromBundle(${bundleId}, '${safePol}')">Remove</button></td>
                            </tr>
                        `;
                    });
                }
                itemsHtml += `</tbody></table>`;

                const tr = document.createElement('tr');
                tr.id = rowId;
                tr.innerHTML = `<td colspan="4" style="background:#f1f3f5; padding: 10px 20px;">${itemsHtml}</td>`;
                
                const parentRow = document.getElementById(`bundle-row-${bundleId}`);
                parentRow.parentNode.insertBefore(tr, parentRow.nextSibling);
            } catch (err) { alert("Failed to load bundle contents."); }
        }

        async function removePolicyFromBundle(bundleId, encodedPolicyId) {
            if(!confirm("Remove this policy from the bundle?")) return;
            try {
                const res = await fetch(`/api/admin/policy-bundles/${bundleId}/items/${encodedPolicyId}`, { method: 'DELETE' });
                if (res.ok) {
                    document.getElementById(`bundle-contents-${bundleId}`).remove();
                    await fetchBundles();
                    toggleBundleContents(bundleId);
                } else { alert("Failed to remove item."); }
            } catch (error) { alert("Network error."); }
        }

        // --- POLICY IMPORT & DELETION LOGIC ---
        document.getElementById('admxUploadForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const admxFile = document.getElementById('admxFile').files[0]; const admlFile = document.getElementById('admlFile').files[0];
            if (!admxFile || !admlFile) return alert("Both ADMX and ADML files are required.");
            const formData = new FormData(); formData.append('admx', admxFile); formData.append('adml', admlFile);
            const btn = e.target.querySelector('button'); btn.innerText = "Parsing XML..."; btn.disabled = true;
            try {
                const response = await fetch('/api/admin/policy/import', { method: 'POST', body: formData });
                if (response.ok) { alert("Policy imported successfully!"); e.target.reset(); fetchPolicies(); } 
                else { const err = await response.json(); alert("Import failed: " + err.error); }
            } catch (error) { alert("Network error during upload."); }
            btn.innerText = "Process and Import Policy"; btn.disabled = false;
        });

        async function fetchPolicies() {
            try {
                const response = await fetch('/api/admin/policy');
                globalPolicies = await response.json();
                const tbody = document.getElementById('policyTableBody');
                tbody.innerHTML = ''; 

                if (globalPolicies.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="4" style="text-align:center;">No policies imported yet.</td></tr>';
                    return;
                }

                globalPolicies.forEach(pol => {
                    const safeId = pol.policy_id.replace(/'/g, "\\'");
                    const safeUrlId = encodeURIComponent(pol.policy_id);
                    const row = document.createElement('tr');
                    row.innerHTML = `
                        <td><strong>${pol.display_name}</strong><br><small style="color:#666;">${pol.policy_id}</small></td>
                        <td>${pol.category}</td>
                        <td style="font-family: monospace; font-size: 0.8em; word-break: break-all;">${pol.registry_key}</td>
                        <td>
                            <button onclick="openUnifiedModal('${safeId}')" style="background: #007bff; margin-bottom: 5px;">Configure</button>
                            <button onclick="deleteFromLibrary('${safeUrlId}')" class="btn-danger" style="margin-left: 5px; margin-bottom: 5px;">Delete</button>
                        </td>
                    `;
                    tbody.appendChild(row);
                });
            } catch (error) { console.error('Error fetching policies:', error); }
        }

        async function deleteFromLibrary(encodedPolicyId) {
            if(!confirm("Are you sure you want to delete this policy? It will also be removed from any bundles it belongs to.")) return;
            try {
                const res = await fetch(`/api/admin/policy/${encodedPolicyId}`, { method: 'DELETE' });
                if (res.ok) {
                    fetchPolicies();
                    fetchBundles(); // Re-fetch bundles to update counts
                } else { alert("Failed to delete policy."); }
            } catch (err) { alert("Network error."); }
        }

        // --- UNIFIED MODAL LOGIC (Config + Assignment) ---
        async function openUnifiedModal(policyId) {
            currentPolicy = globalPolicies.find(p => p.policy_id === policyId);
            if (!currentPolicy) return;
            document.getElementById('configPolicyName').innerText = currentPolicy.display_name;
            const paramContainer = document.getElementById('dynamicFormContainer');
            const bundleContainer = document.getElementById('bundleListContainer');
            
            paramContainer.innerHTML = ''; bundleContainer.innerHTML = '<p style="margin: 0; color: #666;">Loading bundles...</p>';

            let elements = []; try { if (currentPolicy.elements) elements = JSON.parse(currentPolicy.elements); } catch(e) {}
            paramContainer.innerHTML += `<div class="dynamic-field"><label>Policy State:</label><select id="basePolicyState"><option value="1">Enabled</option><option value="0">Disabled</option></select></div>`;

            if (elements.length > 0) {
                paramContainer.innerHTML += `<hr style="border: 0; border-top: 1px solid #ccc; margin: 15px 0;">`;
                elements.forEach(elem => {
                    let inputHtml = '';
                    if (elem.type === 'text') inputHtml = `<input type="text" class="policy-element-input" data-valuename="${elem.valueName || elem.id}" placeholder="Enter value...">`;
                    else if (elem.type === 'decimal') inputHtml = `<input type="number" class="policy-element-input" data-valuename="${elem.valueName || elem.id}" placeholder="0">`;
                    else inputHtml = `<input type="text" class="policy-element-input" data-valuename="${elem.valueName || elem.id}" placeholder="Enter required value...">`;
                    paramContainer.innerHTML += `<div class="dynamic-field"><label>${elem.label || elem.id}</label>${inputHtml}</div>`;
                });
            }

            document.getElementById('unifiedConfigModal').style.display = 'flex';

            try {
                const res = await fetch(`/api/admin/policy-bundles/assignments/${encodeURIComponent(policyId)}`);
                const activeAssignments = await res.json();
                bundleContainer.innerHTML = '';
                if (allPolicyBundles.length === 0) { bundleContainer.innerHTML = '<p style="color: #dc3545;">No bundles exist. Create one first.</p>'; return; }
                allPolicyBundles.forEach(bundle => {
                    const isChecked = activeAssignments.includes(bundle.id) ? 'checked' : '';
                    bundleContainer.innerHTML += `<div style="margin-bottom: 8px;"><input type="checkbox" class="bundle-cb" id="bundle_${bundle.id}" value="${bundle.id}" ${isChecked}><label for="bundle_${bundle.id}" style="cursor: pointer;">${bundle.name}</label></div>`;
                });
            } catch (error) { bundleContainer.innerHTML = '<p style="color: #dc3545;">Error loading bundles.</p>'; }
        }

        function closeUnifiedModal() { document.getElementById('unifiedConfigModal').style.display = 'none'; currentPolicy = null; }

        async function saveConfiguration() {
            const baseState = parseInt(document.getElementById('basePolicyState').value);
            const elementInputs = document.querySelectorAll('.policy-element-input');
            const configuredElements = [];
            elementInputs.forEach(input => configuredElements.push({ valueName: input.getAttribute('data-valuename'), value: input.value, type: input.type === 'number' ? 'DWORD' : 'String' }));

            const checkboxes = document.querySelectorAll('.bundle-cb:checked');
            const bundleIds = Array.from(checkboxes).map(cb => parseInt(cb.value));

            const payload = { policyId: currentPolicy.policy_id, bundleIds: bundleIds, baseState: baseState, configuredElements: configuredElements };
            const btn = event.target; const originalText = btn.innerText; btn.innerText = "Saving..."; btn.disabled = true;

            try {
                const response = await fetch('/api/admin/policy-bundles/assign', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
                if (response.ok) { closeUnifiedModal(); fetchBundles(); } 
                else { const err = await response.json(); alert('Error: ' + err.error); }
            } catch (error) { alert('Network error.'); }
            btn.innerText = originalText; btn.disabled = false;
        }

        // Init
        fetchBundles(); fetchPolicies();
    </script>
    <script src="/js/layout.js"></script>
</body>
</html>
